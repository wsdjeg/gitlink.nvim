name: Run Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        nvim-version: ['stable', 'nightly']
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim-version }}
      
      - name: Install luaunit and luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y lua-luaunit lua-luacheck
      
      - name: Run tests
        run: make test
      
      - name: Run linting
        run: make lint
